<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MISIL GEOPOLÍTICO | SILOS ICBM HISTÓRICOS (URSS/USA) | 200+ ciudades globales</title>
    <link rel="stylesheet" href="css/styles.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <!-- Elementos UI -->
    <div class="info-panel">
        <div class="legend-compact">
            <div class="legend-item"><span class="legend-icon"><svg viewBox="0 0 24 24" stroke="white" stroke-width="1.6" fill="none"><circle cx="12" cy="12" r="9" stroke="white"/></svg></span><span class="legend-text">Ciudad</span></div>
            <div class="legend-item"><span class="legend-icon"><svg viewBox="0 0 24 24" stroke="white" stroke-width="1.6" fill="none"><circle cx="12" cy="16" r="2.5" stroke="white"/><path d="M12 5 L12 14 M8 10 L12 14 L16 10 M7 7 L12 3 L17 7" stroke="white" fill="none"/></svg></span><span class="legend-text">Puerto</span></div>
            <div class="legend-item"><span class="legend-icon"><svg viewBox="0 0 24 24" stroke="white" stroke-width="1.6" fill="none"><polygon points="12,4 18,12 12,20 6,12" stroke="white" fill="none"/><line x1="12" y1="12" x2="12" y2="20" stroke="white"/></svg></span><span class="legend-text">Silo</span></div>
            <div class="legend-item"><span class="legend-icon"><svg viewBox="0 0 24 24" stroke="white" stroke-width="1.6" fill="none"><polygon points="12,4 15,10 22,10 16,14 19,20 12,16 5,20 8,14 2,10 9,10 12,4" stroke="white"/></svg></span><span class="legend-text">Centro Mando</span></div>
        </div>
    </div>

    <div class="missile-status" id="missileStatus">🎯 SELECCIONA UNA CIUDAD: clic en contorno</div>
    <div class="timer-display" id="timerDisplay">⏱️ Tiempo: --:--</div>
    <div class="controls-hint">🖱️ Arrastrar rotar lenta · Scroll zoom · Pan lento · Clic en silo fija menú</div>
    <div id="loader" class="loader">🌍 CARGANDO DATOS HISTÓRICOS + 200 CIUDADES + SILOS</div>

    <div class="hover-side-panel" id="hoverInfoPanel">
        <div class="city-name" id="hoverCityName">—</div>
        <div class="city-sub" id="hoverSubInfo">Pasa el cursor sobre un icono</div>
        <div class="close-fixed" id="closeFixedBtn" style="display: none;">✕</div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
