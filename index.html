    <script type="module">

        // Controles

        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffaa66, 0.2);
        backLight.position.set(0, 1, -5);
        scene.add(backLight);
        
        // Estrellas de fondo
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1800;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 2000;
            starPositions[i*3+1] = (Math.random() - 0.5) * 1000;
            starPositions[i*3+2] = (Math.random() - 0.5) * 150 - 70;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // --- TIERRA: textura base sin bordes políticos (para que solo se vean nuestras fronteras azules) ---
        const earthGeometry = new THREE.SphereGeometry(1.0, 128, 128);
        const textureLoader = new THREE.TextureLoader();
        const earthTexture = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
        const earthMaterial = new THREE.MeshStandardMaterial({ map: earthTexture, roughness: 0.5, metalness: 0.1 });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);
        
        // --- FRONTERAS AZULES UNIFORMES: todas las fronteras del mismo color azul (vectorial) ---
        // Cargamos GeoJSON de países (dominio público) y dibujamos líneas en azul sólido #3a86ff
        let borderGroup = new THREE.Group();
        const BORDER_COLOR = 0x3a86ff;   // Azul eléctrico uniforme como se solicita
        const borderMaterial = new THREE.LineBasicMaterial({ color: BORDER_COLOR, linewidth: 1 }); // linewidth no soportado en WebGL, pero se ve nítido
        
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                console.log('Cargando fronteras globales...');
                data.features.forEach(feature => {
                    const geometry = feature.geometry;
                    if (geometry.type === 'Polygon') {
                        drawPolygon(geometry.coordinates);
                    } else if (geometry.type === 'MultiPolygon') {
                        geometry.coordinates.forEach(poly => drawPolygon(poly));
                    }
                });
                scene.add(borderGroup);
                document.getElementById('loader')?.remove();
            })
            .catch(err => {
                console.warn('Error cargando GeoJSON, usando bordes alternativos (fallback simple)', err);
                // Fallback: agregar algunos bordes simbólicos para no dejar sin fronteras, pero manteniendo el azul uniforme.
                drawSimpleFallbackBorders();
                scene.add(borderGroup);
                document.getElementById('loader')?.remove();
            });
        
        function drawPolygon(coordsArray) {
            coordsArray.forEach(ring => {
                const points = [];
                ring.forEach(coord => {
                    const lng = coord[0];
                    const lat = coord[1];
                    const phi = (90 - lat) * Math.PI / 180;
                    const theta = lng * Math.PI / 180;
                    const r = 1.003; // ligeramente por encima de la esfera para evitar z-fighting
                    const x = r * Math.sin(phi) * Math.cos(theta);
                    const y = r * Math.cos(phi);
                    const z = r * Math.sin(phi) * Math.sin(theta);
                    points.push(new THREE.Vector3(x, y, z));
                });
                const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(lineGeometry, borderMaterial);
                borderGroup.add(line);
            });
        }
        
        function drawSimpleFallbackBorders() {
            // Bordes continentales simples para garantizar visual azul uniforme (coastlines aproximadas)
            const coastlines = [
                [[-130,50],[-100,50],[-80,40],[-70,30],[-60,10],[-50,-15],[-40,-25],[-60,-40],[-80,-50],[-110,-45],[-130,-30],[-150,-20],[-170,30],[-130,50]],
                [[-20,35],[10,45],[30,50],[50,60],[80,70],[100,65],[120,55],[140,40],[160,50],[160,70],[140,75],[100,80],[60,70],[30,65],[10,60],[-20,45],[-20,35]],
                [[30,-35],[45,-30],[60,-20],[80,-10],[100,-10],[120,-15],[140,-25],[150,-35],[130,-45],[110,-40],[90,-40],[70,-38],[50,-40],[30,-35]],
                [[10,70],[20,75],[40,80],[60,80],[80,75],[90,70],[80,65],[60,68],[40,70],[20,68],[10,70]]
            ];
            coastlines.forEach(lineCoords => {
                const points = [];
                lineCoords.forEach(coord => {
                    const lng = coord[0];
                    const lat = coord[1];
                    const phi = (90 - lat) * Math.PI / 180;
                    const theta = lng * Math.PI / 180;
                    const r = 1.003;
                    const x = r * Math.sin(phi) * Math.cos(theta);
                    const y = r * Math.cos(phi);
                    const z = r * Math.sin(phi) * Math.sin(theta);
                    points.push(new THREE.Vector3(x, y, z));
                });
                const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(lineGeometry, borderMaterial);
                borderGroup.add(line);
            });
        }

        function crearIcono(tipo, colorBase = null) {

            div.style.fontWeight = 'bold';
            if (tipo === 'ciudad') { div.style.borderColor = '#88aaff'; div.style.backgroundColor = '#2266cc'; div.innerHTML = '●'; div.style.color = 'white'; div.style.fontSize = '16px'; }
            else if (tipo === 'puerto') { div.style.borderColor = '#44ccaa'; div.style.backgroundColor = '#228866'; div.innerHTML = '⚓'; div.style.fontSize = '12px'; }
            else if (tipo === 'silo') { div.style.borderColor = '#ffaa66'; div.style.backgroundColor = '#aa4422'; div.innerHTML = '▲'; div.style.fontSize = '12px'; }
            else if (tipo === 'mando') { div.style.borderColor = '#ffcc88'; div.style.backgroundColor = '#cc8844'; div.innerHTML = '★'; div.style.fontSize = '12px'; }
            return new CSS2DObject(div);
        }
        
        function agregarMarcador(item) {
            const lat = item.lat, lon = item.lon;
            const phi = (90 - lat) * Math.PI / 180;
            const theta = lon * Math.PI / 180;
            const r = 1.02;
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.cos(phi);
            const z = r * Math.sin(phi) * Math.sin(theta);
            const marker = crearIcono(item.tipo);
            marker.position.set(x, y, z);
            marker.userData = { nombre: item.nombre, pais: item.pais, tipo: item.tipo, lat, lon, pos3d: new THREE.Vector3(x, y, z) };
            scene.add(marker);
            allMarkers.push(marker);
        }
        
        ciudades.forEach(c => agregarMarcador({ ...c, tipo: "ciudad" }));
        puertos.forEach(p => agregarMarcador({ ...p, tipo: "puerto" }));
        silos.forEach(s => agregarMarcador({ ...s, tipo: "silo" }));
        centrosMando.forEach(m => agregarMarcador({ ...m, tipo: "mando" }));
        
        // --- Raycaster para interacción hover/clic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let currentHover = null;
        let fixedCity = null;
        const hoverPanel = document.getElementById('hoverInfoPanel');
        const hoverName = document.getElementById('hoverCityName');
        const hoverSub = document.getElementById('hoverSubInfo');
        const closeBtn = document.getElementById('closeFixedBtn');
        
        function updatePanel(data, isFixed = false) {
            if (isFixed && fixedCity) {
                hoverName.innerText = data.nombre;
                hoverSub.innerText = `${data.pais} | ${data.tipo.toUpperCase()} | Coord: ${data.lat.toFixed(2)}°, ${data.lon.toFixed(2)}°`;
                hoverPanel.classList.add('fixed');
                closeBtn.style.display = 'block';
            } else if (!isFixed) {
                if (!fixedCity) {
                    hoverName.innerText = data?.nombre || '—';
                    hoverSub.innerText = data ? `${data.pais} | ${data.tipo.toUpperCase()}` : 'Pasa el cursor sobre un icono';
                    hoverPanel.classList.remove('fixed');
                    closeBtn.style.display = 'none';
                }
            }
        }
        
        closeBtn.addEventListener('click', () => {
            fixedCity = null;
            hoverPanel.classList.remove('fixed');
            closeBtn.style.display = 'none';
            hoverName.innerText = '—';
            hoverSub.innerText = 'Pasa el cursor sobre un icono';
        });
        
        // SIMULACIÓN DE MISIL
        let activeTimer = null;
        const missileStatusDiv = document.getElementById('missileStatus');
        const timerDiv = document.getElementById('timerDisplay');
        function lanzarMisil(ciudadData) {
            if (activeTimer) clearInterval(activeTimer);
            const distancia = Math.random() * 8000 + 2000;
            const segundos = Math.floor(distancia / 1800) + 4;
            missileStatusDiv.innerHTML = `🚀 OBJETIVO: ${ciudadData.nombre} | IMPACTO EN ${segundos}s`;
            let remaining = segundos;
            timerDiv.innerHTML = `⏱️ Tiempo restante: ${remaining}s`;
            activeTimer = setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(activeTimer);
                    timerDiv.innerHTML = `💥 IMPACTO EN ${ciudadData.nombre} 💥`;
                    missileStatusDiv.innerHTML = `💥 ${ciudadData.nombre} DESTRUIDO | MISIL ICBM IMPACTADO`;
                    setTimeout(() => {
                        if (!activeTimer) timerDiv.innerHTML = `⏱️ Tiempo: --:--`;
                        missileStatusDiv.innerHTML = `🎯 SELECCIONA UNA CIUDAD: clic en su icono`;
                    }, 4000);
                    activeTimer = null;
                } else {
                    timerDiv.innerHTML = `⏱️ Tiempo restante: ${remaining}s`;
                    missileStatusDiv.innerHTML = `🚀 MISIL EN VUELO → ${ciudadData.nombre} | Impacto: ${remaining}s`;
                }
            }, 1000);
        }
        
        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(allMarkers);
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                const data = hit.userData;
                if (data && data.tipo === 'ciudad') {
                    lanzarMisil(data);
                } else if (data && (data.tipo === 'silo' || data.tipo === 'mando')) {
                    fixedCity = data;
                    updatePanel(data, true);
                }
            }
        });
        
        window.addEventListener('mousemove', (event) => {
            if (fixedCity) return;
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(allMarkers);
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                if (currentHover !== hit) {
                    currentHover = hit;
                    updatePanel(hit.userData, false);
                }
            } else {
                if (currentHover !== null) {
                    currentHover = null;
                    if (!fixedCity) updatePanel(null, false);
                }
            }
        });
        
        // Animación y luz dinámica
        const clock = new THREE.Clock();
        function animate() {
            const delta = clock.getDelta();
            controls.update(); // actualiza rotación/zoom
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        // Remover loader después de 1.5s
        setTimeout(() => {
            const ld = document.getElementById('loader');
            if (ld) ld.style.opacity = '0';
            setTimeout(() => ld?.remove(), 800);
        }, 1500);
        
        // Ajuste de ventana
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Pequeño efecto de brillo en la atmósfera
        const atmosGeometry = new THREE.SphereGeometry(1.01, 64, 64);
        const atmosMaterial = new THREE.MeshPhongMaterial({ color: 0x2266aa, transparent: true, opacity: 0.08 });
        const atmosphere = new THREE.Mesh(atmosGeometry, atmosMaterial);
        scene.add(atmosphere);
        
        console.log("✅ Fronteras unificadas en color azul #3a86ff, resto intacto. Total marcadores: " + allMarkers.length);
    </script>
</body>
</html>
