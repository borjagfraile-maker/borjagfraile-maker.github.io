<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MISIL GEOPOLÍTICO | SILOS ICBM HISTÓRICOS (URSS/USA) | 200+ ciudades globales</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Poppins', 'Segoe UI', 'Inter', system-ui, sans-serif;
            color: #e8eef4;
        }

        .hover-side-panel {
            position: absolute;
            bottom: 24px;
            right: 24px;
            z-index: 30;
            background: rgba(8, 12, 28, 0.85);
            backdrop-filter: blur(14px);
            border-radius: 20px;
            padding: 12px 18px;
            min-width: 220px;
            max-width: 320px;
            border: 1px solid rgba(210, 180, 140, 0.6);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
            text-align: left;
            transition: all 0.2s ease;
        }

        .hover-side-panel.fixed {
            border-color: #ffaa55;
            box-shadow: 0 0 12px rgba(255, 170, 85, 0.4);
            background: rgba(12, 18, 38, 0.92);
        }

        .hover-side-panel .city-name {
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff5e0, #ffd966);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 0.2px;
            margin-bottom: 4px;
        }

        .hover-side-panel .city-sub {
            font-size: 0.7rem;
            margin-top: 6px;
            opacity: 0.9;
            font-family: monospace;
            color: #b9c7ff;
            line-height: 1.4;
        }

        .close-fixed {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 1rem;
            cursor: pointer;
            color: #ffaa66;
            background: rgba(0,0,0,0.4);
            width: 20px;
            height: 20px;
            text-align: center;
            border-radius: 20px;
            line-height: 18px;
            font-weight: bold;
            transition: 0.2s;
        }
        .close-fixed:hover {
            background: #ffaa66;
            color: #1a1a2e;
        }

        .info-panel {
            position: absolute;
            bottom: 24px;
            left: 24px;
            z-index: 20;
            background: rgba(8, 12, 28, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 6px 12px;
            border: 1px solid rgba(200, 210, 255, 0.2);
            pointer-events: none;
            max-width: 380px;
        }
        
        .legend-compact {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: flex-start;
            font-size: 0.6rem;
            font-weight: 400;
            letter-spacing: 0.2px;
            color: #ffffff;
        }
        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(20, 25, 45, 0.5);
            padding: 2px 8px;
            border-radius: 40px;
        }
        .legend-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
        }
        .legend-icon svg {
            width: 12px;
            height: 12px;
            stroke: #ffffff;
            stroke-width: 1.6;
            fill: none;
        }
        .legend-text {
            font-size: 0.6rem;
            font-weight: 450;
            color: #f0f3fc;
        }
        @media (max-width: 550px) {
            .legend-compact { gap: 6px; }
            .legend-item { padding: 1px 6px; }
            .legend-text { font-size: 0.55rem; }
            .legend-icon svg { width: 10px; height: 10px; }
            .info-panel { padding: 4px 10px; bottom: 18px; left: 18px; }
        }

        .missile-status {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 6px 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            border-left: 3px solid #ffaa55;
            pointer-events: none;
            font-weight: 500;
            color: #eef2ff;
        }

        .timer-display {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 5px 14px;
            font-family: monospace;
            font-size: 0.65rem;
            font-weight: 500;
            color: #ffdd99;
            pointer-events: none;
        }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(12, 16, 32, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 4px 10px;
            font-size: 0.55rem;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.15);
            pointer-events: none;
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #ddeeff;
            border: 1px solid rgba(255,200,100,0.5);
            pointer-events: none;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            .info-panel { padding: 4px 8px; bottom: 16px; left: 16px; max-width: 280px; }
            .missile-status { font-size: 0.55rem; top: 12px; left: 12px; padding: 4px 10px; }
            .timer-display { font-size: 0.55rem; top: 12px; right: 12px; }
            .hover-side-panel { bottom: 16px; right: 16px; padding: 8px 14px; min-width: 170px; }
            .hover-side-panel .city-name { font-size: 0.9rem; }
            .legend-text { font-size: 0.5rem; }
            .legend-icon svg { width: 9px; height: 9px; }
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <div class="legend-compact">
            <div class="legend-item">
                <span class="legend-icon"><svg viewBox="0 0 24 24" stroke="white" stroke-width="1.6" fill="none"><circle cx="12" cy="12" r="9" stroke="white"/></svg></span>
                <span class="legend-text">Ciudad</span>
            </div>
            <div class="legend-item">
                <span class="legend-icon"><svg viewBox="0 0 24 24" stroke="white" stroke-width="1.6" fill="none"><circle cx="12" cy="16" r="2.5" stroke="white"/><path d="M12 5 L12 14 M8 10 L12 14 L16 10 M7 7 L12 3 L17 7" stroke="white" fill="none"/></svg></span>
                <span class="legend-text">Puerto</span>
            </div>
            <div class="legend-item">
                <span class="legend-icon"><svg viewBox="0 0 24 24" stroke="white" stroke-width="1.6" fill="none"><polygon points="12,4 18,12 12,20 6,12" stroke="white" fill="none"/><line x1="12" y1="12" x2="12" y2="20" stroke="white"/></svg></span>
                <span class="legend-text">Silo</span>
            </div>
            <div class="legend-item">
                <span class="legend-icon"><svg viewBox="0 0 24 24" stroke="white" stroke-width="1.6" fill="none"><polygon points="12,4 15,10 22,10 16,14 19,20 12,16 5,20 8,14 2,10 9,10 12,4" stroke="white"/></svg></span>
                <span class="legend-text">Centro Mando</span>
            </div>
        </div>
    </div>

    <div class="missile-status" id="missileStatus">🎯 SELECCIONA UNA CIUDAD: clic en contorno</div>
    <div class="timer-display" id="timerDisplay">⏱️ Tiempo: --:--</div>
    <div class="controls-hint">🖱️ Arrastrar rotar lenta · Scroll zoom · Pan lento · Clic en silo fija menú</div>
    <div id="loader" class="loader">🌍 CARGANDO DATOS HISTÓRICOS + 200 CIUDADES + SILOS</div>

    <div class="hover-side-panel" id="hoverInfoPanel">
        <div class="city-name" id="hoverCityName">—</div>
        <div class="city-sub" id="hoverSubInfo">Pasa el cursor sobre un icono</div>
        <div class="close-fixed" id="closeFixedBtn" style="display: none;">✕</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="main.js"></script>
</body>
</html>
