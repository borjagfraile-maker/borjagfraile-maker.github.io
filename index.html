    <style>
        /* (Mantén exactamente los mismos estilos que en tu código original) */
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Poppins', 'Segoe UI', 'Inter', system-ui, sans-serif;

            border-color: #ffaa55;

            background: rgba(12, 18, 38, 0.92);
        }
        .hover-side-panel .city-name {
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff5e0, #ffd966);

            font-family: monospace;

            line-height: 1.4;

            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 1rem;
            cursor: pointer;
            color: #ffaa66;
            background: rgba(0,0,0,0.4);
            width: 20px;
            height: 20px;
            text-align: center;
            border-radius: 20px;
            line-height: 18px;
            font-weight: bold;
            transition: 0.2s;
        }
        .close-fixed:hover {
            background: #ffaa66;
            color: #1a1a2e;
        }
        .info-panel {
            position: absolute;
            bottom: 24px;
            left: 24px;
            z-index: 20;
            background: rgba(8, 12, 28, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 6px 12px;
            border: 1px solid rgba(200, 210, 255, 0.2);
            pointer-events: none;
            max-width: 380px;
            transition: all 0.2s;
        }
        .legend-compact {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: flex-start;
            font-size: 0.6rem;
            font-weight: 400;
            letter-spacing: 0.2px;
            color: #ffffff;
        }
        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(20, 25, 45, 0.5);
            padding: 2px 8px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
            transition: 0.1s;
        }
        .legend-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
        }
        .legend-icon svg {
            width: 12px;
            height: 12px;
            stroke: #ffffff;
            stroke-width: 1.6;
            fill: none;
        }
        .legend-text {
            font-size: 0.6rem;
            font-weight: 450;
            color: #f0f3fc;
            letter-spacing: 0.3px;
            line-height: 1;
        }
        @media (max-width: 550px) {
            .legend-compact { gap: 6px; }
            .legend-item { padding: 1px 6px; }
            .legend-text { font-size: 0.55rem; }
            .legend-icon svg { width: 10px; height: 10px; }
            .info-panel { padding: 4px 10px; bottom: 18px; left: 18px; }
        }
        .missile-status {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 6px 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            border-left: 3px solid #ffaa55;
            pointer-events: none;
            font-weight: 500;
            color: #eef2ff;
        }
        .timer-display {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 5px 14px;
            font-family: monospace;
            font-size: 0.65rem;
            font-weight: 500;
            color: #ffdd99;
            pointer-events: none;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(12, 16, 32, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 4px 10px;
            font-size: 0.55rem;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.15);
            pointer-events: none;
        }
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #ddeeff;
            border: 1px solid rgba(255,200,100,0.5);
            pointer-events: none;
            white-space: nowrap;
        }
        @media (max-width: 600px) {
            .info-panel { padding: 4px 8px; bottom: 16px; left: 16px; max-width: 280px; }
            .missile-status { font-size: 0.55rem; top: 12px; left: 12px; padding: 4px 10px; }
            .timer-display { font-size: 0.55rem; top: 12px; right: 12px; }
            .hover-side-panel { bottom: 16px; right: 16px; padding: 8px 14px; min-width: 170px; }
            .hover-side-panel .city-name { font-size: 0.9rem; }
            .legend-text { font-size: 0.5rem; }
            .legend-icon svg { width: 9px; height: 9px; }
        }
    </style>

<body>
    <!-- PANEL INFERIOR IZQUIERDO: LEYENDA -->
    <div class="info-panel">
        <div class="legend-compact">
            <div class="legend-item"><span class="legend-icon"><svg viewBox="0 0 24 24" stroke="white" stroke-width="1.6" fill="none"><circle cx="12" cy="12" r="9" stroke="white"/></svg></span><span class="legend-text">Ciudad</span></div>
            <div class="legend-item"><span class="legend-icon"><svg viewBox="0 0 24 24" stroke="white" stroke-width="1.6" fill="none"><circle cx="12" cy="16" r="2.5" stroke="white"/><path d="M12 5 L12 14 M8 10 L12 14 L16 10 M7 7 L12 3 L17 7" stroke="white" fill="none"/></svg></span><span class="legend-text">Puerto</span></div>
            <div class="legend-item"><span class="legend-icon"><svg viewBox="0 0 24 24" stroke="white" stroke-width="1.6" fill="none"><polygon points="12,4 18,12 12,20 6,12" stroke="white" fill="none"/><line x1="12" y1="12" x2="12" y2="20" stroke="white"/></svg></span><span class="legend-text">Silo</span></div>
            <div class="legend-item"><span class="legend-icon"><svg viewBox="0 0 24 24" stroke="white" stroke-width="1.6" fill="none"><polygon points="12,4 15,10 22,10 16,14 19,20 12,16 5,20 8,14 2,10 9,10 12,4" stroke="white"/></svg></span><span class="legend-text">Centro Mando</span></div>
        </div>

    <div class="missile-status" id="missileStatus">🎯 SELECCIONA UNA CIUDAD: clic en contorno</div>
    <div class="timer-display" id="timerDisplay">⏱️ Tiempo: --:--</div>

    <div class="hover-side-panel" id="hoverInfoPanel">
        <div class="city-name" id="hoverCityName">—</div>
        <div class="city-sub" id="hoverSubInfo">Pasa el cursor sobre un icono</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { globalCitiesPorts, ussrCitiesData, usCitiesData } from './ciudades.js';
        import { initMenuManager } from './menuManager.js';

        // ---------- CONFIGURACIÓN GLOBO (sin cambios) ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030318);
        scene.fog = new THREE.FogExp2(0x030318, 0.00045);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0.7, 0.2, 3.0);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.07;
        controls.rotateSpeed = 0.25;
        controls.zoomSpeed = 0.9;
        controls.enablePan = true;
        controls.panSpeed = 0.35;
        controls.keyPanSpeed = 5.0;
        controls.target.set(0, 0, 0);
        controls.minDistance = 1.2;
        controls.maxDistance = 4.0;

        // Estrellas (igual que antes)
        const starGeo = new THREE.BufferGeometry();
        const starCount = 2800;
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 900;
            starPos[i*3+1] = (Math.random() - 0.5) * 600;
            starPos[i*3+2] = (Math.random() - 0.5) * 400 - 120;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xaacdff, size: 0.13, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        const starGeo2 = new THREE.BufferGeometry();
        const starCount2 = 1800;
        const starPos2 = new Float32Array(starCount2 * 3);
        for (let i = 0; i < starCount2; i++) {
            starPos2[i*3] = (Math.random() - 0.5) * 1300;
            starPos2[i*3+1] = (Math.random() - 0.5) * 800;
            starPos2[i*3+2] = (Math.random() - 0.5) * 550 - 180;
        }
        starGeo2.setAttribute('position', new THREE.BufferAttribute(starPos2, 3));
        const starMat2 = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.09, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const stars2 = new THREE.Points(starGeo2, starMat2);
        scene.add(stars2);

        // Iluminación
        const ambient = new THREE.AmbientLight(0x20223a, 0.55);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xfff2e0, 1.1);
        mainLight.position.set(4, 3.5, 5);
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x4466aa, 0.5);
        fillLight.position.set(-2, 1, -3);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0x88aaff, 0.6);
        rimLight.position.set(1.3, 1.5, -2.8);
        scene.add(rimLight);
        
        const earthMat = new THREE.MeshStandardMaterial({ color: 0x101a2a, roughness: 0.7, metalness: 0.15, emissive: 0x030714, emissiveIntensity: 0.1 });
        const earthSphere = new THREE.Mesh(new THREE.SphereGeometry(1.0, 128, 128), earthMat);
        scene.add(earthSphere);
        const atmosMat = new THREE.MeshPhongMaterial({ color: 0x7799cc, emissive: 0x112244, transparent: true, opacity: 0.08, side: THREE.BackSide });
        const atmosphere = new THREE.Mesh(new THREE.SphereGeometry(1.008, 96, 96), atmosMat);
        scene.add(atmosphere);
        
        const bordersGroup = new THREE.Group();
        scene.add(bordersGroup);
        
        const EARTH_RADIUS_VISUAL = 1.0;
        const MAX_ALT_KM = 1450;
        const MAX_ALT_RATIO = MAX_ALT_KM / 6371;
        
        function geoToVector3(lon, lat) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = (-lon) * Math.PI / 180;
            const x = EARTH_RADIUS_VISUAL * Math.sin(phi) * Math.cos(theta);
            const y = EARTH_RADIUS_VISUAL * Math.cos(phi);
            const z = EARTH_RADIUS_VISUAL * Math.sin(phi) * Math.sin(theta);
            return new THREE.Vector3(x, y, z);
        }
        
        function alignToNorth(obj, pos, lat, lon) {
            const radial = pos.clone().normalize();
            let north = new THREE.Vector3(0, 1, 0).clone().sub(radial.clone().multiplyScalar(radial.y));
            if (north.length() < 0.001) north = new THREE.Vector3(1, 0, 0).cross(radial).normalize();
            else north.normalize();
            const east = north.clone().cross(radial).normalize();
            const matrix = new THREE.Matrix4();
            matrix.set(
                east.x, north.x, radial.x, 0,
                east.y, north.y, radial.y, 0,
                east.z, north.z, radial.z, 0,
                0, 0, 0, 1
            );
            const quaternion = new THREE.Quaternion().setFromRotationMatrix(matrix);
            obj.quaternion.copy(quaternion);
        }
        
        // ================== CONSTRUIR CIUDADES CON DATOS EXTERNOS ==================
        // 1. Ciudades globales
        const globalCities = globalCitiesPorts.map(c => ({ name: c[0], lat: c[1], lon: c[2], country: c[3], type: c[4] ? "puerto" : "interior", side: "global" }));
        
        // 2. URSS
        const ussrCities = [];
        for (let i = 0; i < ussrCitiesData.length; i += 3) {
            let type = "interior";
            const name = ussrCitiesData[i];
            if (["San Petersburgo","Odesa","Vladivostok","Kaliningrado","Novorossiysk","Sevastopol"].includes(name)) type = "puerto";
            ussrCities.push({ name: name, lat: ussrCitiesData[i+1], lon: ussrCitiesData[i+2], side: "ussr", type: type, country: "URSS" });
        }
        
        // 3. Estados Unidos
        const usCities = [];
        for (let i = 0; i < usCitiesData.length; i += 3) {
            let type = "interior";
            const name = usCitiesData[i];
            if (["Nueva York","Los Ángeles","San Diego","Seattle","Boston","Miami","Nueva Orleans","Baltimore","Portland"].includes(name)) type = "puerto";
            usCities.push({ name: name, lat: usCitiesData[i+1], lon: usCitiesData[i+2], side: "usa", type: type, country: "EE.UU." });
        }
        
        const allCities = [...ussrCities, ...usCities, ...globalCities];
        
        function getPopulationEstimate(cityName, side) {
            const majorCities = ["Moscú", "Nueva York", "Los Ángeles", "Londres", "París", "Tokio", "Pekín", "Shanghái", "São Paulo", "Mumbai", "El Cairo", "Ciudad de México"];
            if (majorCities.includes(cityName)) return "~8-12M";
            if (cityName === "Chicago" || cityName === "Houston" || cityName === "Berlín" || cityName === "Madrid") return "~2.5-4M";
            if (side === "ussr") return "~1-2M";
            if (side === "usa") return "~500k-1.5M";
            return "~500k-2M";
        }
        
        function createCircleOutline(radius, color, pointsCount = 36) {
            const vertices = [];
            for (let i = 0; i <= pointsCount; i++) {
                const angle = (i / pointsCount) * Math.PI * 2;
                vertices.push(new THREE.Vector3(radius * Math.cos(angle), radius * Math.sin(angle), 0));
            }
            const geometry = new THREE.BufferGeometry().setFromPoints(vertices);
            return new THREE.LineLoop(geometry, new THREE.LineBasicMaterial({ color: color }));
        }
        
        function createPortIcon(color, size = 0.0022) {
            const outerGroup = new THREE.Group();
            const innerGroup = new THREE.Group();
            innerGroup.rotation.z = Math.PI;
            const baseRadius = size;
            const ring = createCircleOutline(baseRadius, color, 24);
            innerGroup.add(ring);
            const mastPoints = [new THREE.Vector3(0, -baseRadius*0.6, 0), new THREE.Vector3(0, baseRadius*0.8, 0)];
            const mastLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(mastPoints), new THREE.LineBasicMaterial({ color: color }));
            innerGroup.add(mastLine);
            const leftHook = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, baseRadius*0.6, 0), new THREE.Vector3(-baseRadius*0.7, baseRadius*0.2, 0)]), new THREE.LineBasicMaterial({ color: color }));
            const rightHook = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, baseRadius*0.6, 0), new THREE.Vector3(baseRadius*0.7, baseRadius*0.2, 0)]), new THREE.LineBasicMaterial({ color: color }));
            innerGroup.add(leftHook, rightHook);
            const topBar = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-baseRadius*0.5, baseRadius*0.85, 0), new THREE.Vector3(baseRadius*0.5, baseRadius*0.85, 0)]), new THREE.LineBasicMaterial({ color: color }));
            innerGroup.add(topBar);
            outerGroup.add(innerGroup);
            return outerGroup;
        }
        
        function createStarOutline(outerRadius, innerRadius, color, points = 5) {
            const vertices = [];
            for (let i = 0; i < points * 2; i++) {
                const radius = i % 2 === 0 ? outerRadius : innerRadius;
                const angle = (i * Math.PI * 2) / (points * 2) - Math.PI / 2;
                vertices.push(new THREE.Vector3(radius * Math.cos(angle), radius * Math.sin(angle), 0));
            }
            vertices.push(vertices[0]);
            const geometry = new THREE.BufferGeometry().setFromPoints(vertices);
            return new THREE.Line(geometry, new THREE.LineBasicMaterial({ color: color }));
        }
        
        function createCityIcon(city, isSpecial = false, specialType = null) {
            const pos = geoToVector3(city.lon, city.lat);
            let icon;
            if (isSpecial) {
                icon = createStarOutline(0.0035, 0.0015, 0xffcc66, 5);
            } else {
                let color;
                if (city.side === "ussr") color = 0xcc6666;
                else if (city.side === "usa") color = 0x66aaff;
                else color = 0xffaa66;
                if (city.type === "puerto") icon = createPortIcon(0xff8844, 0.0022);
                else icon = createCircleOutline(0.0022, color, 36);
            }
            icon.position.copy(pos);
            alignToNorth(icon, pos, city.lat, city.lon);
            scene.add(icon);
            const hitMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
            const hitSphere = new THREE.Mesh(new THREE.SphereGeometry(0.012, 12, 12), hitMat);
            hitSphere.position.copy(pos);
            let entityType = "city";
            if (specialType === "commandCenter") entityType = "commandCenter";
            hitSphere.userData = { type: entityType, cityData: city, lineRef: icon, specialType: specialType };
            scene.add(hitSphere);
            return { lineLoop: icon, hitSphere, cityData: city };
        }
        
        const cityItems = [];
        allCities.forEach(city => {
            const isMoscow = (city.name === "Moscú");
            const specialType = isMoscow ? "commandCenter" : null;
            cityItems.push(createCityIcon(city, isMoscow, specialType));
        });
        
        const noradPos = geoToVector3(-104.846, 38.742);
        const noradStar = createStarOutline(0.0035, 0.0015, 0xffcc66, 5);
        noradStar.position.copy(noradPos);
        alignToNorth(noradStar, noradPos, 38.742, -104.846);
        scene.add(noradStar);
        const noradHitSphere = new THREE.Mesh(new THREE.SphereGeometry(0.014, 12, 12), new THREE.MeshStandardMaterial({ transparent: true, opacity: 0 }));
        noradHitSphere.position.copy(noradPos);
        noradHitSphere.userData = { type: "commandCenter", name: "NORAD", lineRef: noradStar, specialType: "commandCenter" };
        scene.add(noradHitSphere);
        const starGlow = new THREE.PointLight(0xffaa55, 0.2, 0.4);
        starGlow.position.copy(noradPos);
        scene.add(starGlow);
        
        // SILOS (sin cambios)
        const ussrSilosData = [
            { name: "Plesetsk", lat: 62.7, lon: 40.3, missiles: 80, type: "SS-11/SS-19", rangeKm: 10000 },
            { name: "Tatishchevo (Sarátov)", lat: 51.7, lon: 45.6, missiles: 120, type: "SS-19", rangeKm: 10000 },
            { name: "Dombarovsky (Yasny)", lat: 50.8, lon: 59.5, missiles: 60, type: "SS-18", rangeKm: 16000 },
            { name: "Kozelsk", lat: 54.0, lon: 35.8, missiles: 80, type: "SS-19", rangeKm: 10000 },
            { name: "Kartaly", lat: 53.1, lon: 60.6, missiles: 70, type: "SS-18", rangeKm: 16000 },
            { name: "Uzhur", lat: 55.3, lon: 89.8, missiles: 90, type: "SS-18", rangeKm: 16000 },
            { name: "Aleysk", lat: 52.5, lon: 82.8, missiles: 50, type: "SS-25 Topol", rangeKm: 10000 }
        ];
        const usaBasesData = [
            { name: "Minot AFB", lat: 48.4155, lon: -101.3576, missiles: 150, type: "Minuteman III", rangeKm: 13000 },
            { name: "Malmstrom AFB", lat: 47.5047, lon: -111.187, missiles: 150, type: "Minuteman III", rangeKm: 13000 },
            { name: "F.E. Warren AFB", lat: 41.1335, lon: -104.871, missiles: 150, type: "Minuteman III", rangeKm: 13000 },
            { name: "Ellsworth AFB", lat: 44.1455, lon: -103.1035, missiles: 150, type: "Minuteman II", rangeKm: 11000 },
            { name: "Whiteman AFB", lat: 38.7304, lon: -93.5479, missiles: 150, type: "Minuteman II", rangeKm: 11000 },
            { name: "Grand Forks AFB", lat: 47.9611, lon: -97.401, missiles: 150, type: "Minuteman III", rangeKm: 13000 },
            { name: "Little Rock AFB", lat: 35.0165, lon: -92.5625, missiles: 18, type: "Titan II", rangeKm: 15000 }
        ];
        
        function createPointedSiloIcon(sizeScale = 0.0028, color = 0xbcbcbc) {
            const baseWidth = 0.0009, bodyHeight = 0.0032, extendedHeight = bodyHeight * 1.5, tipHeight = 0.0014;
            const totalHeight = extendedHeight + tipHeight;
            const halfWidth = baseWidth / 2;
            const bottomY = -totalHeight/2, midY = bottomY + extendedHeight, tipY = totalHeight/2;
            const points = [
                new THREE.Vector3(-halfWidth, bottomY, 0),
                new THREE.Vector3(-halfWidth, midY, 0),
                new THREE.Vector3(0, tipY, 0),
                new THREE.Vector3(halfWidth, midY, 0),
                new THREE.Vector3(halfWidth, bottomY, 0),
                new THREE.Vector3(-halfWidth, bottomY, 0)
            ];
            const scale = sizeScale / 0.003;
            const scaledPoints = points.map(p => p.clone().multiplyScalar(scale));
            const geometry = new THREE.BufferGeometry().setFromPoints(scaledPoints);
            return new THREE.Line(geometry, new THREE.LineBasicMaterial({ color: color }));
        }
        
        function addSilosFromData(basesArray, siloColor, sideLabel) {
            const items = [];
            basesArray.forEach(base => {
                const numIcons = Math.ceil(base.missiles / 50);
                for (let i = 0; i < numIcons; i++) {
                    let latOffset = (Math.random() - 0.5) * 1.5;
                    let lonOffset = (Math.random() - 0.5) * 2.0;
                    let finalLat = Math.min(70, Math.max(30, base.lat + latOffset));
                    let finalLon = Math.min(150, Math.max(-125, base.lon + lonOffset));
                    const pos = geoToVector3(finalLon, finalLat);
                    const siloIcon = createPointedSiloIcon(0.0025, siloColor);
                    siloIcon.position.copy(pos);
                    alignToNorth(siloIcon, pos, finalLat, finalLon);
                    scene.add(siloIcon);
                    const hitMat = new THREE.MeshStandardMaterial({ transparent: true, opacity: 0 });
                    const hitSphere = new THREE.Mesh(new THREE.SphereGeometry(0.009, 10, 10), hitMat);
                    hitSphere.position.copy(pos);
                    hitSphere.userData = { type: "silo", baseName: base.name, missileType: base.type, missilesPerIcon: 50, totalMissiles: base.missiles, side: sideLabel, rangeKm: base.rangeKm, lineRef: siloIcon, originalColor: siloColor };
                    scene.add(hitSphere);
                    items.push({ hitSphere, line: siloIcon, data: hitSphere.userData });
                }
            });
            return items;
        }
        
        const siloItemsUSSR = addSilosFromData(ussrSilosData, 0xcc5555, "ussr");
        const siloItemsUSA = addSilosFromData(usaBasesData, 0xbcbcbc, "usa");
        const allSiloItems = [...siloItemsUSSR, ...siloItemsUSA];
        
        // ========== INICIALIZAR GESTOR DE MENÚS ==========
        const menuManager = initMenuManager({
            hoverableObjects: [...cityItems.map(c => c.hitSphere), noradHitSphere, ...allSiloItems.map(s => s.hitSphere)],
            allSiloItems: allSiloItems,
            scene: scene,
            camera: camera,
            renderer: renderer,
            getPopulationEstimate: getPopulationEstimate,
            starGlow: starGlow
        });
        
        // ========== LÓGICA DE MISILES Y RAYOS (LA QUE YA TENÍAS) ==========
        let missileActive = false, dashLineObj = null, activeExplosion = null, currentMission = null;
        
        function haversineDistance(lon1, lat1, lon2, lat2) {
            const toRad = d => d * Math.PI/180;
            const dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
            const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
            return 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        
        function getRandomEnemy(baseCity) {
            let enemyList = [];
            if (baseCity.side === "ussr") enemyList = allCities.filter(c => c.side === "usa" || c.side === "global");
            else if (baseCity.side === "usa") enemyList = allCities.filter(c => c.side === "ussr" || c.side === "global");
            else enemyList = allCities.filter(c => c.side === "ussr" || c.side === "usa");
            if(enemyList.length === 0) return null;
            return enemyList[Math.floor(Math.random()*enemyList.length)];
        }
        
        function launchMissile(startCity, targetCity) {
            if(missileActive) {
                if(dashLineObj) scene.remove(dashLineObj);
                missileActive=false;
            }
            const startVec = geoToVector3(startCity.lon, startCity.lat).normalize();
            const endVec = geoToVector3(targetCity.lon, targetCity.lat).normalize();
            const totalAngle = startVec.angleTo(endVec);
            const distKm = haversineDistance(startCity.lon, startCity.lat, targetCity.lon, targetCity.lat);
            const V_MAX_KMS = 25000/3600, T_ACCEL = 240, ACCEL = V_MAX_KMS/T_ACCEL, DIST_ACCEL = 0.5*ACCEL*T_ACCEL*T_ACCEL;
            const totalTime = distKm <= DIST_ACCEL ? Math.sqrt(2*distKm/ACCEL) : T_ACCEL + (distKm-DIST_ACCEL)/V_MAX_KMS;
            const points = [];
            for (let i=0; i<=240; i++) {
                const frac = i/240;
                const angle = totalAngle*frac, sinTot = Math.sin(totalAngle);
                const w1 = Math.sin(totalAngle-angle)/sinTot, w2 = Math.sin(angle)/sinTot;
                const dir = new THREE.Vector3().copy(startVec).multiplyScalar(w1).add(endVec.clone().multiplyScalar(w2)).normalize();
                points.push(dir.multiplyScalar(1.0 + MAX_ALT_RATIO * 4 * frac * (1 - frac)));
            }
            const vertices = [];
            for (let i=0; i<points.length-1; i++) if(i%2===0) vertices.push(points[i].x, points[i].y, points[i].z, points[i+1].x, points[i+1].y, points[i+1].z);
            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
            const dashLine = new THREE.LineSegments(geom, new THREE.LineBasicMaterial({ color: 0xffaa66 }));
            if(dashLineObj) scene.remove(dashLineObj);
            dashLineObj = dashLine;
            scene.add(dashLineObj);
            const startTime = performance.now()/1000;
            missileActive = true;
            currentMission = { startCity, targetCity, totalTime, startTime, points, totalDistKm: distKm };
            const enemyFlag = startCity.side === "ussr" ? "🇺🇸 USA" : (startCity.side === "usa" ? "🇷🇺 URSS" : "🌍 ENEMIGO GLOBAL");
            document.getElementById('missileStatus').innerHTML = `🚀 LANZAMIENTO: ${startCity.name} → ${targetCity.name} (${enemyFlag})<br>📡 Distancia: ${Math.floor(distKm)} km`;
        }
        
        function updateFlight(nowSec) {
            if(!missileActive||!currentMission) return;
            const elapsed = nowSec - currentMission.startTime;
            const total = currentMission.totalTime;
            if(elapsed>=total) {
                missileActive=false;
                const impactPos = geoToVector3(currentMission.targetCity.lon, currentMission.targetCity.lat);
                const group = new THREE.Group();
                const core = new THREE.Mesh(new THREE.SphereGeometry(0.028,18,18), new THREE.MeshStandardMaterial({ color:0xffaa66, emissive:0xff4422, emissiveIntensity:2.0 }));
                group.add(core);
                const ringMat = new THREE.MeshBasicMaterial({ color:0xff8844, transparent:true, opacity:0.9, side:THREE.DoubleSide });
                const ring = new THREE.Mesh(new THREE.RingGeometry(0.05,0.14,24), ringMat);
                ring.rotation.x = Math.PI/2;
                group.add(ring);
                group.position.copy(impactPos);
                scene.add(group);
                activeExplosion = group;
                setTimeout(() => { if(activeExplosion) scene.remove(activeExplosion); activeExplosion = null; }, 2000);
                document.getElementById('missileStatus').innerHTML = `💥 IMPACTO en ${currentMission.targetCity.name}`;
                if(dashLineObj) scene.remove(dashLineObj);
                dashLineObj=null;
                currentMission=null;
                return;
            }
            const frac = Math.min(1, elapsed/total);
            const visibleCount = Math.floor(frac * currentMission.points.length)+1;
            const vertices = [];
            for (let i=0; i<visibleCount-1; i++) if(i%2===0) vertices.push(currentMission.points[i].x, currentMission.points[i].y, currentMission.points[i].z, currentMission.points[i+1].x, currentMission.points[i+1].y, currentMission.points[i+1].z);
            const newGeom = new THREE.BufferGeometry();
            newGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
            if(dashLineObj) scene.remove(dashLineObj);
            dashLineObj = new THREE.LineSegments(newGeom, new THREE.LineBasicMaterial({ color: 0xffaa66 }));
            scene.add(dashLineObj);
            const remaining = Math.max(0,total-elapsed);
            const remMin=Math.floor(remaining/60), remSec=Math.floor(remaining%60);
            document.getElementById('missileStatus').innerHTML = `🚀 TRAYECTORIA: ${currentMission.startCity.name} → ${currentMission.targetCity.name}<br>⏱️ restante ${remMin}:${remSec.toString().padStart(2,'0')}`;
            const elMin=Math.floor(elapsed/60), elSec=Math.floor(elapsed%60);
            document.getElementById('timerDisplay').innerHTML = `⏱️ Tiempo: ${elMin}:${elSec.toString().padStart(2,'0')} / ${Math.floor(total/60)}:${Math.floor(total%60).toString().padStart(2,'0')}`;
        }
        
        // Integramos el clic del misil con el gestor de menús
        function onClickHandler(event) {
            // Primero le damos oportunidad al menú de manejar el clic
            const handled = menuManager.handleClick(event);
            if (handled) return;
            
            // Si no manejó, continuamos con la lógica de misiles
            mouseVec.x = (event.clientX/renderer.domElement.clientWidth)*2-1;
            mouseVec.y = -(event.clientY/renderer.domElement.clientHeight)*2+1;
            const clickRaycaster = new THREE.Raycaster();
            clickRaycaster.setFromCamera(mouseVec, camera);
            const allClickable = [...cityItems.map(c=>c.hitSphere), noradHitSphere];
            const hits = clickRaycaster.intersectObjects(allClickable);
            if(hits.length) {
                const data = hits[0].object.userData;
                if(data.type === 'city') {
                    const enemy = getRandomEnemy(data.cityData);
                    if(enemy) launchMissile(data.cityData, enemy);
                    else document.getElementById('missileStatus').innerHTML = "⚠️ Sin objetivos enemigos";
                    menuManager.clearFixedSilo();
                }
            } else {
                menuManager.clearFixedSilo();
            }
        }
        
        window.addEventListener('click', onClickHandler);
        
        function renderLoop() {
            requestAnimationFrame(renderLoop);
            const now = performance.now()/1000;
            if(missileActive) updateFlight(now);
            controls.update();
            renderer.render(scene,camera);
        }
        renderLoop();
        
        window.addEventListener('resize',()=>{
            camera.aspect=window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth,window.innerHeight);
        });
        
        const ussrSet = new Set(["Russia","Russian Federation","Ukraine","Belarus","Moldova","Lithuania","Latvia","Estonia","Georgia","Armenia","Azerbaijan","Kazakhstan","Uzbekistan","Turkmenistan","Kyrgyzstan","Tajikistan"]);
        function addBorder(ring, color) {
            if(!ring||ring.length<2) return;
            const points=[];
            for(let [lon,lat] of ring) if(isFinite(lon)&&isFinite(lat)) points.push(geoToVector3(lon,lat));
            if(points.length<2) return;
            const geom = new THREE.BufferGeometry().setFromPoints(points);
            bordersGroup.add(new THREE.Line(geom, new THREE.LineBasicMaterial({color})));
        }
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(r=>r.json())
            .then(data=>{
                data.features.forEach(f=>{
                    const name = f.properties?.ADMIN||f.properties?.name||"";
                    const isUSSR = ussrSet.has(name);
                    const col = isUSSR ? 0xcc5555 : 0x6e8bcb;
                    const geom = f.geometry;
                    if(!geom) return;
                    const coords = geom.coordinates;
                    if(geom.type==="Polygon") coords.forEach(r=>addBorder(r,col));
                    else if(geom.type==="MultiPolygon") coords.forEach(p=>p.forEach(r=>addBorder(r,col)));
                });
                document.getElementById('loader').style.opacity='0';
                setTimeout(()=>document.getElementById('loader').style.visibility='hidden',800);
            })
            .catch(()=>{
                document.getElementById('loader').innerHTML='⚠️ FRONTERAS SIMBÓLICAS';
                setTimeout(()=>document.getElementById('loader').style.opacity='0',2000);
            });
        
        function animateStars() {
            stars.rotation.y+=0.0002;
            stars2.rotation.y-=0.00012;
            requestAnimationFrame(animateStars);
        }
        animateStars();
        
        document.getElementById('missileStatus').innerHTML = "🎯 SILOS ICBM HISTÓRICOS (URSS 1.400, USA 1.054) | 200+ ciudades globales | Clic en ciudad → misil | Clic en silo → fija menú";
    </script>
</body>
